function renderAthleteDetail(){
  const a = coachData.athletes.find(x=>x.uid===coachView.uid);
  if (!a) { coachView=null; return renderCoach(); }
  const ss = a.sessions;
  let idx = ss.findIndex(s=>s.id===coachView.sessId);
  if (idx<0) idx = ss.length-1;
  const s = ss[idx];
  let h = '<button class="silink" onclick="closeAthlete()">\u2190 Roster</button>';
  h += '<h2 class="sect disp a">'+esc(a.name)+'</h2>';
  // session selector
  h += '<div class="panel a"><div class="field"><label>Session</label><select class="progsel" onchange="pickAthleteSession(this.value)">';
  for (let i=ss.length-1;i>=0;i--){
    const x=ss[i]; let vol=0;
    Object.values(x.entries||{}).forEach(sets=>sets.forEach(e=>{vol+=(e.w||0)*e.r;}));
    h += '<option value="'+x.id+'"'+(i===idx?' selected':'')+'>'+fmtDate(x.date)+' \u00B7 '+(x.activity?esc(x.activity.name):esc(x.workout))+(x.deload?' \u00B7 deload':'')+' \u00B7 '+(x.activity?(x.activity.mins||0)+' min':(vol>=1000?(vol/1000).toFixed(1)+'k':Math.round(vol))+' lb')+'</option>';
  }
  h += '</select></div>';
  if (s.deload) h += '<p class="statline">Deload session \u2014 planned half loads; dips here are by design.</p>';
  if (s.note) h += '<p class="hnote">\u270E '+esc(s.note)+'</p>';
  {
    const ex = (a.notes||[]).find(n=>n.session_id===s.id);
    const draft = coachNoteDrafts[s.id]!==undefined ? coachNoteDrafts[s.id] : (ex?ex.body:"");
    h += '<div class="menusect" style="margin-top:12px">Feedback to '+esc(a.name.split(" ")[0])+'</div>';
    h += '<textarea class="notearea" rows="2" placeholder="e.g. Drop leg press 10% \u2014 pain-free depth only" onchange="coachNoteDrafts['+s.id+']=this.value">'+esc(draft)+'</textarea>';
    h += '<button class="sibtn fullw" style="margin-top:8px" onclick="saveCoachNote(\''+a.uid+'\','+s.id+')">'+(ex?'Update note':'Send note')+'</button>';
    if (ex) h += '<p class="statline">Sent '+fmtDate(ex.created_at)+'</p>';
  }
  h += '</div>';
  if (s.activity){
    h += '<div class="panel a"><p class="statline">Activity session: <b>'+esc(s.activity.name)+'</b>'+(s.activity.mins?' \u00B7 '+s.activity.mins+' min':'')+'</p></div>';
    return h;
  }
  h += whoopPanel(a.days, "Recovery \u0026 sleep", a.sessions);
  h += sleepPanel(a.days);
  h += strainPanel(a.days);
  // lift table
  h += '<div class="panel a"><table class="lifttab"><thead><tr><th>Lift</th><th>Sets</th><th></th></tr></thead><tbody>';
  for (const [exId, sets] of Object.entries(s.entries||{})){
    const prev = prevEntryIn(ss, idx, exId);
    const bw = sets.every(x=>!x.w);
    h += '<tr><td class="ln">'+esc(exDisplayName(exId))
      +((s.exNotes&&s.exNotes[exId])?'<span class="lnote">\u270E '+esc(s.exNotes[exId])+'</span>':'')
      +'</td><td class="num sets">'+sets.map(x=>bw? x.r : (x.w+"\u00D7"+x.r)).join(" \u00B7 ")+'</td>'
      +'<td class="trc">'+(s.deload?'<span class="tr flat">DL</span>':trendMark(sets, prev))+'</td></tr>';
  }
  h += '</tbody></table></div>';
  return h;
}
function renderCoach(){
  if (!coachData) return '<div class="panel a"><p class="empty">Loading roster\u2026</p></div>';
  if (progEdit) return renderProgEdit();
  if (coachView) return renderAthleteDetail();
  let h = '<h2 class="sect disp a">Roster \u2014 '+coachData.athletes.length+' athlete'+(coachData.athletes.length===1?'':'s')+'</h2>';
  [...coachData.athletes].sort((x,y)=>athleteFlags(y).length-athleteFlags(x).length).forEach((a,i)=>{
    const flags = athleteFlags(a);
    h += '<div class="panel a coachcard" style="animation-delay:'+(Math.min(i,8)*22)+'ms" onclick="openAthlete(\''+a.uid+'\')">';
    if (flags.length || a.rec){ h += '<div class="flagrow">';
      if (a.rec && a.rec.recovery_score!=null){ const sc=Math.round(a.rec.recovery_score);
        h += '<span class="flag rec '+recBand(sc)+'">'+sc+'% rec</span>'; }
      flags.forEach(f=>{ h += '<span class="flag l'+f.lvl+'">'+f.t+'</span>'; }); h += '</div>'; }
    h += '<div class="volhead"><span class="vh disp" style="font-size:19px">'+esc(a.name)+'</span>'
      +'<span class="delta num '+(a.wkN>=WEEK_TARGET?"up":"down")+'">'+a.wkN+'/'+WEEK_TARGET+' this wk</span></div>';
    h += '<p class="statline num">'+(a.last?("Last trained "+fmtDate(a.last)):"Never trained")+' \u00B7 '+a.total+' sessions \u00B7 '+(a.wkVol>=1000?(a.wkVol/1000).toFixed(1)+"k":a.wkVol)+' lb this week</p>';
    if (a.lastNote) h += '<p class="hnote">\u270E '+esc(a.lastNote.t)+' <span style="color:var(--faint)">('+fmtDate(a.lastNote.d)+')</span></p>';
    h += '<div class="field" style="margin-top:10px" onclick="event.stopPropagation()"><label>Program</label><select class="progsel" onchange="assignProgram(\''+a.uid+'\', this.value)">';
    h += '<option value=""'+(a.program_id?'':' selected')+'>\u2014 none (built-in default)</option>';
    coachData.programs.forEach(p=>{ h += '<option value="'+p.id+'"'+(p.id===a.program_id?' selected':'')+'>'+esc(p.name)+'</option>'; });
    h += '</select></div></div>';
  });
    h += '<h2 class="sect disp a">Programs</h2><div class="panel a">';
  coachData.programs.forEach(p=>{
    h += '<div class="trow"><span class="d">'+esc(p.name)+'</span><span class="s"><button class="silink" onclick="openProgEdit(\''+p.id+'\')">Edit</button></span></div>';
  });
  h += '<button class="silink" onclick="openProgEdit(null)">+ New program</button></div>';
  return h;
}

// ================= Manual backup =================
function exportData(){
  const blob = new Blob([JSON.stringify({sessions, deloadSkips, metrics},null,1)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "iron-log-backup-"+new Date().toISOString().slice(0,10)+".json";
  a.click();
  URL.revokeObjectURL(a.href);
}
function importData(input){
  const f = input.files[0]; if(!f) return;
  const rd = new FileReader();
  rd.onload = () => {
    try {
      const p = JSON.parse(rd.result);
      if (!Array.isArray(p.sessions)) throw 0;
      const ids = new Set(sessions.map(s=>s.id));
      let added=0;
      p.sessions.forEach(s=>{ if(!ids.has(s.id)){ sessions.push(s); added++; } });
      sessions.sort((a,b)=>a.id-b.id);
      persist(); toast("Imported "+added+" sessions."); render();
    } catch(e){ toast("Invalid backup file."); }
  };
  rd.readAsText(f);
  input.value="";
}

let draftRestored = false;
try {
  const d = JSON.parse(localStorage.getItem(DRAFT_KEY)||"null");
  if (d && Date.now()-d.t < DRAFT_TTL && d.values && Object.keys(d.values).length){
    if (d.workoutId && WORKOUTS[d.workoutId]) workoutId = d.workoutId;
    values = d.values; subs = d.subs||{}; sessionNote = d.sessionNote||""; noteDrafts = d.noteDrafts||{};
    if (d.wkStart && Date.now()-d.wkStart < DRAFT_TTL){ wkStart = d.wkStart; startWkTick(); }
    draftRestored = true;
  } else if (d) clearDraft();
} catch(e){}
applyThemeAttr();
render();
if (draftRestored) setTimeout(()=>toast("Unsaved session restored \u2014 pick up where you left off."), 400);
bootBackend();

</script>
